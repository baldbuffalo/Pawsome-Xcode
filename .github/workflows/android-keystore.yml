name: Generate Android Keystore

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: "Keystore password"
        required: true
      key_password:
        description: "Key password"
        required: true
      alias:
        description: "Key alias"
        required: true
        default: "pawsome"

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version: '17'
      - name: Generate keystore + SHA-1
        run: |
          keytool -genkeypair -v -keystore pawsome.jks \
            -alias "${{ inputs.alias }}" -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass "${{ inputs.store_password }}" -keypass "${{ inputs.key_password }}" \
            -dname "CN=Pawsome, OU=App, O=Pawsome, C=US"
          echo "================ SHA-1 (register in the Android OAuth client) ================"
          keytool -list -v -keystore pawsome.jks -alias "${{ inputs.alias }}" \
            -storepass "${{ inputs.store_password }}" | grep -i 'SHA1:'
          base64 -w0 pawsome.jks > pawsome.jks.b64
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: android-keystore
          path: pawsome.jks.b64
          if-no-files-found: error
