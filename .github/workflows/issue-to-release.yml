name: Issue to Release

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read

jobs:
  create-release:
    if: contains(github.event.issue.labels.*.name, 'fixed')
    runs-on: ubuntu-latest
    steps:
      - name: Create release notes
        id: release-notes
        run: |
          cat << 'RELEASE_EOF' > $GITHUB_OUTPUT
          release_notes<<'NOTES'
          ## What's Changed

          **${{ github.event.issue.title }}** by @${{ github.event.issue.user.login }} in #${{ github.event.issue.number }}

          ${{ github.event.issue.body }}
          NOTES
          RELEASE_EOF

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="beta-${TIMESTAMP}"
          
          gh release create "$TAG" \
            --title "Pawsome - Beta" \
            --target "${{ github.sha }}" \
            --prerelease \
            --latest \
            --notes "${{ steps.release-notes.outputs.release_notes }}"
          
          echo "Created release: $TAG"
