name: Issue to Release

on:
  issues:
    types: [closed]

permissions:
  contents: write
  issues: read

jobs:
  create-release:
    if: contains(github.event.issue.labels.*.name, 'fixed')
    runs-on: ubuntu-latest
    steps:
      - name: Get issue details
        id: issue
        run: |
          echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "body=${{ github.event.issue.body }}" >> $GITHUB_OUTPUT
          echo "reporter=@${{ github.event.issue.user.login }}" >> $GITHUB_OUTPUT

      - name: Extract labels
        id: labels
        run: |
          LABELS=$(echo '${{ toJSON(github.event.issue.labels.*.name) }}' | jq -r '.[]' | grep -v '^fixed$' | tr '\n' ',' | sed 's/,$//')
          echo "labels=$LABELS" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          TAG="beta-${TIMESTAMP}"
          DATE=$(date +"%Y-%m-%d %H:%M")
          
          # Build release body
          cat << 'RELEASE_EOF' > /tmp/release_body.md
          ## Issue Fixed: #${{ github.event.issue.number }}
          
          **${{ github.event.issue.title }}**
          
          Reported by: ${{ steps.issue.outputs.reporter }}
          
          ---
          
          ${{ github.event.issue.body }}
          
          ---
          
          *This release was automatically generated by OpenHands AI agent.*
          RELEASE_EOF
          
          gh release create "$TAG" \
            --title "Pawsome - Beta ($DATE)" \
            --body-file /tmp/release_body.md \
            --prerelease
          
          echo "Created release: $TAG"
