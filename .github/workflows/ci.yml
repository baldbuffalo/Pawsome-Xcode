name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  core:
    name: Core engine build & tests (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Test Pawsome.Core
        run: dotnet test Pawsome.Core.Tests/Pawsome.Core.Tests.csproj -c Release

  windows-app:
    name: Windows app build (WinUI 3)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Publish Pawsome.App (self-contained .exe)
        run: dotnet publish Pawsome.App/Pawsome.App.csproj -c Release -r win-x64 -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true --self-contained
      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: Pawsome-Windows-x64
          path: Pawsome-Windows/Pawsome.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish
          if-no-files-found: error
