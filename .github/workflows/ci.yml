name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  core:
    name: Core engine build & tests (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Test Pawsome.Core
        run: dotnet test Pawsome.Core.Tests/Pawsome.Core.Tests.csproj -c Release

  windows-app:
    name: Windows app build (WinUI 3)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Publish Pawsome.exe (single self-contained file)
        run: dotnet publish Pawsome.App/Pawsome.App.csproj -c Release -r win-x64 --self-contained -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=embedded -p:GoogleClientId=${{ secrets.WINDOWS_GOOGLE_CLIENT_ID }} -p:GoogleClientSecret=${{ secrets.WINDOWS_GOOGLE_CLIENT_SECRET }}
      - name: Upload Windows build
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Pawsome-Windows-x64
          path: Pawsome-Windows/Pawsome.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/Pawsome.exe
          if-no-files-found: error
      - name: Publish raw Pawsome.exe as 'latest' release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete latest --cleanup-tag --yes 2>$null
          gh release create latest "Pawsome.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/Pawsome.exe" -t "Pawsome" -n "Auto-built from main" --latest

  android-app:
    name: Android app build (Jetpack Compose)
    runs-on: ubuntu-latest
    needs: windows-app
    defaults:
      run:
        working-directory: Pawsome-Android
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: '8.7'
      - name: Build APK
        env:
          ANDROID_GOOGLE_CLIENT_ID: ${{ secrets.WINDOWS_GOOGLE_CLIENT_ID }}
          ANDROID_GOOGLE_CLIENT_SECRET: ${{ secrets.WINDOWS_GOOGLE_CLIENT_SECRET }}
          PAWSOME_GITHUB_TOKEN: ${{ secrets.PAWSOME_GITHUB_TOKEN }}
        run: gradle assembleDebug
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Pawsome-Android
          path: Pawsome-Android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
      - name: Add Pawsome.apk to 'latest' release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          cp "$(ls app/build/outputs/apk/debug/*.apk | head -n1)" Pawsome.apk
          gh release upload latest Pawsome.apk --clobber
