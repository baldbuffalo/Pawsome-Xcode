name: CI 

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  core:
    name: Core engine build & tests (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Test Pawsome.Core
        run: dotnet test Pawsome.Core.Tests/Pawsome.Core.Tests.csproj -c Release

  windows-app:
    name: Windows app build (WinUI 3)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Publish Pawsome.exe (single self-contained file)
        run: dotnet publish Pawsome.App/Pawsome.App.csproj -c Release -r win-x64 --self-contained -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=embedded -p:EnableWindowsTargeting=true -p:GoogleClientId=${{ secrets.WINDOWS_GOOGLE_CLIENT_ID }} -p:GoogleClientSecret=${{ secrets.WINDOWS_GOOGLE_CLIENT_SECRET }} -p:TwitterConsumerKey=${{ secrets.TWITTER_CONSUMER_KEY }} -p:TwitterConsumerSecret=${{ secrets.TWITTER_CONSUMER_SECRET }}
      - name: Upload Windows build
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Pawsome-Windows-x64
          path: Pawsome-Windows/Pawsome.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish/Pawsome.exe
          if-no-files-found: error

  ios-app:
    name: iOS app build (SwiftUI)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Pawsome
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Show available simulators
        run: xcrun simctl list devices available | grep -E "iPhone|iPad" | head -10
      - name: Setup Secrets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p Pawsome.xcodeproj/xcshareddata/xcschemes
          cat > Pawsome/Secrets.xcconfig << EOF
          GITHUB_TOKEN = $GITHUB_TOKEN
          EOF
      - name: Build iOS app (Simulator)
        run: |
          xcodebuild -project Pawsome.xcodeproj \
            -scheme Pawsome \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
      - name: Upload iOS build log
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ios-build-log
          path: ~/Library/Logs/DiagnosticReports/*.plist
          if-no-files-found: ignore

  android-app:
    name: Android app build (Jetpack Compose)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pawsome-Android
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-java@v5.3.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v6.2.0
        with:
          gradle-version: '8.7'
      - name: Build APK
        env:
          ANDROID_GOOGLE_WEB_CLIENT_ID: ${{ secrets.ANDROID_GOOGLE_WEB_CLIENT_ID }}
          TWITTER_CONSUMER_KEY: ${{ secrets.TWITTER_CONSUMER_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.TWITTER_CONSUMER_SECRET }}
          PAWSOME_IMAGE_UPLOAD_TOKEN: ${{ secrets.PAWSOME_IMAGE_UPLOAD_TOKEN }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Add GitHub token to gradle.properties for image uploads
          echo "GITHUB_TOKEN=$PAWSOME_IMAGE_UPLOAD_TOKEN" >> gradle.properties
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            export ANDROID_KEYSTORE_FILE="$RUNNER_TEMP/release.jks"
          fi
          gradle assembleRelease
      - name: Upload APK artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Pawsome-Android
          path: Pawsome-Android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    name: Create release with all builds
    runs-on: ubuntu-latest
    needs: [core, windows-app, ios-app, android-app]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Download Windows build
        uses: actions/download-artifact@v8.0.1
        with:
          name: Pawsome-Windows-x64
          path: windows
      - name: Download Android build
        uses: actions/download-artifact@v8.0.1
        with:
          name: Pawsome-Android
          path: android
      - name: Create release with both artifacts
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mv windows/Pawsome.exe Pawsome.exe
          APK_FILE=$(ls android/*.apk | head -n1)
          mv "$APK_FILE" Pawsome.apk
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest Pawsome.exe Pawsome.apk -t "Pawsome" -n "Auto-built from main" --latest
