name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  core:
    name: Core engine build & tests (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Test Pawsome.Core
        run: dotnet test Pawsome.Core.Tests/Pawsome.Core.Tests.csproj -c Release

  windows-app:
    name: Windows app build (WinUI 3)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: Pawsome-Windows
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-dotnet@v5.3.0
        with:
          dotnet-version: '8.0.x'
      - name: Publish Pawsome.exe (single self-contained file)
        run: dotnet publish Pawsome.App/Pawsome.App.csproj -c Release -r win-x64 --self-contained -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:IncludeAllContentForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:DebugType=embedded -p:GoogleClientId=${{ secrets.WINDOWS_GOOGLE_CLIENT_ID }}
      - name: Upload Windows build
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Pawsome-Windows-x64
          path: Pawsome-Windows/Pawsome.App/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish
          if-no-files-found: error
