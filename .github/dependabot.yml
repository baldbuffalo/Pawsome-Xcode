version: 2
updates:
  # iOS CocoaPods dependencies
  - package-ecosystem: "cocoapods"
    directory: "/Pawsome"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ios"
    commit-message:
      prefix: "ios"

  # Android Gradle dependencies
  - package-ecosystem: "gradle"
    directory: "/Pawsome-Android"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "android"
    commit-message:
      prefix: "android"

  # .NET NuGet dependencies (Windows)
  - package-ecosystem: "nuget"
    directory: "/Pawsome-Windows"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "windows"
    commit-message:
      prefix: "windows"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
